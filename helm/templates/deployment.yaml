# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fishkube.fullname" . }}
  labels:
    {{- include "fishkube.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
{{- if eq (.Values.mode | default "manager") "manager" }}
  strategy:
    type: {{ .Values.deployment.strategy.type | default "Recreate" }}
    {{- if eq (.Values.deployment.strategy.type | default "Recreate") "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.strategy.rollingUpdate.maxSurge | default 0 }}
      maxUnavailable: {{ .Values.deployment.strategy.rollingUpdate.maxUnavailable | default 1 }}
    {{- end }}
{{- end }}
  selector:
    matchLabels:
      {{- include "fishkube.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fishkube.selectorLabels" . | nindent 8 }}
        {{- include "fishkube.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
{{- if eq (.Values.mode | default "manager") "manager" }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGraceSeconds | default 10 }}
{{- end }}
      serviceAccountName: {{ include "fishkube.serviceAccountName" . }}
{{- if eq (.Values.mode | default "manager") "manager" }}
      securityContext:
        fsGroup: 1000
{{- end }}
      containers:
        - name: {{ include "fishkube.appName" . }}
{{- if eq (.Values.mode | default "manager") "agent" }}
          image: "{{ .Values.agent.image.repository | default .Values.image.repository }}:{{ .Values.agent.image.tag | default .Values.image.tag }}"
{{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ include "fishkube.containerPort" . }}
              protocol: TCP
{{- if eq (.Values.mode | default "manager") "agent" }}
          # ── Agent env ──────────────────────────────────────
          env:
            - name: FKM_AGENT_TOKEN
              value: "{{ .Values.agent.token }}"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
{{- else }}
          # ── Manager env ────────────────────────────────────
          env:
            - name: OPENAI_TEMPERATURE
              value: "{{ .Values.ai.OPENAI_TEMPERATURE }}"
            - name: OPENAI_MODEL
              value: "{{ .Values.ai.OPENAI_MODEL }}"
            - name: OPENAI_API_KEY
              value: "{{ .Values.ai.OPENAI_API_KEY }}"
            - name: FKM_AI_PROVIDER
              value: "{{ .Values.ai.AI_PROVIDER | default "openai" }}"
            - name: GEMINI_API_KEY
              value: "{{ .Values.ai.GEMINI_API_KEY | default "" }}"
            - name: GEMINI_MODEL
              value: "{{ .Values.ai.GEMINI_MODEL | default "" }}"
            - name: AWS_REGION
              value: "{{ .Values.ai.AWS_REGION | default "" }}"
            - name: BEDROCK_MODEL_ID
              value: "{{ .Values.ai.BEDROCK_MODEL_ID | default "" }}"
            - name: DB_PATH
              value: "{{ .Values.auth.dbPath }}"
            - name: FKM_DB
              value: "{{ .Values.auth.dbPath }}"
            - name: FKM_BOOTSTRAP_USER
              value: "{{ .Values.auth.bootstrapUser }}"
            - name: FKM_SECRET
              {{- if .Values.auth.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: {{ .Values.auth.secretKeys.secret }}
              {{- else }}
              value: "{{ .Values.auth.secretInline.secret }}"
              {{- end }}
            - name: FKM_BOOTSTRAP_PASS
              {{- if .Values.auth.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: {{ .Values.auth.secretKeys.bootstrapPass }}
              {{- else }}
              value: "{{ .Values.auth.secretInline.bootstrapPass }}"
              {{- end }}
            - name: FKM_AUTH_PROVIDER
              value: "{{ .Values.authProvider.provider | default "local" }}"
            {{- if eq (.Values.authProvider.provider | default "local") "google" }}
            - name: GOOGLE_CLIENT_ID
              value: "{{ .Values.authProvider.google.clientId }}"
            - name: GOOGLE_CLIENT_SECRET
              value: "{{ .Values.authProvider.google.clientSecret }}"
            - name: GOOGLE_ALLOWED_DOMAIN
              value: "{{ .Values.authProvider.google.allowedDomain }}"
            - name: FKM_OAUTH_REDIRECT_URI
              value: "{{ .Values.authProvider.google.redirectUri }}"
            - name: FKM_COOKIE_DOMAIN
              value: "{{ .Values.authProvider.cookieDomain }}"
            - name: FKM_SESSION_COOKIE_NAME
              value: "{{ .Values.authProvider.sessionCookieName | default "fishkube_session" }}"
            - name: FKM_ALLOW_LOCAL_WITH_GOOGLE
              value: "{{ ternary "true" "false" (.Values.authProvider.allowLocalWithGoogle | default true) }}"
            {{- end }}
            {{- if .Values.integrations }}
            {{- if .Values.integrations.jira }}
            - name: FKM_JIRA_BASE_URL
              value: "{{ .Values.integrations.jira.baseUrl | default "" }}"
            - name: FKM_JIRA_USER_EMAIL
              value: "{{ .Values.integrations.jira.userEmail | default "" }}"
            - name: FKM_JIRA_API_TOKEN
              value: "{{ .Values.integrations.jira.apiToken | default "" }}"
            {{- end }}
            {{- if .Values.integrations.slack }}
            - name: FKM_SLACK_BOT_TOKEN
              value: "{{ .Values.integrations.slack.botToken | default "" }}"
            - name: FKM_SLACK_CHANNEL_ID
              value: "{{ .Values.integrations.slack.channelId | default "" }}"
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
{{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ include "fishkube.healthPath" . }}
              port: {{ include "fishkube.containerPort" . }}
            initialDelaySeconds: {{ ternary 3 5 (eq (.Values.mode | default "manager") "agent") }}
            periodSeconds: {{ ternary 10 5 (eq (.Values.mode | default "manager") "agent") }}
          livenessProbe:
            httpGet:
              path: {{ include "fishkube.healthPath" . }}
              port: {{ include "fishkube.containerPort" . }}
            initialDelaySeconds: {{ ternary 5 10 (eq (.Values.mode | default "manager") "agent") }}
            periodSeconds: {{ ternary 30 10 (eq (.Values.mode | default "manager") "agent") }}
{{- if and (eq (.Values.mode | default "manager") "manager") .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "fishkube.fullname" . }}-data
          {{- end }}
{{- end }}
